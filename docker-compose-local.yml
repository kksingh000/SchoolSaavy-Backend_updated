services:
  # Laravel Application with RoadRunner
  app:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_app_local
    restart: unless-stopped
    command: >
      sh -c "
        echo '🧹 Clearing Laravel caches...' &&
        php artisan config:clear &&
        php artisan cache:clear &&
        php artisan route:clear &&
        echo '🚀 Starting Octane with Swoole (Memory Optimized)...' &&
        php artisan octane:start --max-requests=100 --server=swoole --host=0.0.0.0 --port=8080 --workers=4 --task-workers=6 --verbose
      "
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_LEVEL=debug
      - LOG_CHANNEL=stderr
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # MySQL Database
  # db:
  #   image: mysql:8.0
  #   container_name: schoolsavvy_db_local
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: password
  #     MYSQL_DATABASE: schoolsaavy_local
  #     MYSQL_USER: schoolsaavy
  #     MYSQL_PASSWORD: password
  #   volumes:
  #     - mysql_data_local:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - schoolsavvy_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: schoolsavvy_redis_local
    restart: unless-stopped
    ports:
      - "6379"
    networks:
      - schoolsavvy_network

  # Nginx Load Balancer (Optional for local)
  nginx:
    image: nginx:alpine
    container_name: schoolsavvy_nginx_local
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
    command: |
      sh -c "
      apk add --no-cache netcat-openbsd
      cat > /etc/nginx/nginx.conf << 'EOF'
      events {
          worker_connections 1024;
      }
      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;
          client_max_body_size 100M;
          
          upstream app_backend {
              server app:8080 max_fails=3 fail_timeout=30s;
          }
          
          server {
              listen 80;
              server_name localhost;
              
              location / {
                  proxy_pass http://app_backend;
                  proxy_set_header Host \$$host;
                  proxy_set_header X-Real-IP \$$remote_addr;
                  proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$$scheme;
                  proxy_connect_timeout 30s;
                  proxy_send_timeout 30s;
                  proxy_read_timeout 30s;
                  proxy_buffering off;
              }
          }
      }
      EOF
      echo 'Waiting for app to be ready...'
      while ! nc -z app 8080; do
          echo 'App not ready, waiting...'
          sleep 2
      done
      echo 'App is ready, starting nginx'
      nginx -g 'daemon off;'
      "
    depends_on:
      - app
    networks:
      - schoolsavvy_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_queue_local
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Starting Laravel Queue Worker...' &&
        php artisan queue:work --queue=fee-processing,default --sleep=3 --tries=3 --max-time=3600 --timeout=300
      "
    environment:
      - APP_ENV=local
      - APP_NAME=Laravel
      - APP_DEBUG=true
      - LOG_LEVEL=debug
      - LOG_CHANNEL=stderr
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - REDIS_PREFIX=laravel_database_
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Scheduler (Cron jobs)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - APP_ENV=local
      - APP_NAME=Laravel
      - APP_DEBUG=true
      - LOG_LEVEL=debug
      - LOG_CHANNEL=stderr
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

volumes:
  mysql_data_local:
    driver: local

networks:
  schoolsavvy_network:
    driver: bridge
