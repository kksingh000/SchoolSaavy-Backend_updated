# Redis configuration for Laravel

# Network
bind 0.0.0.0
port 6379

# Memory optimizations
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Security
# requirepass your_redis_password_here

# Logging
loglevel notice

# Performance
tcp-keepalive 300
timeout 0
