# Redis configuration for Laravel

# Network
bind 0.0.0.0
port 6379

# Memory optimizations  
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (optimized for queue processing)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes

# Security
# requirepass your_redis_password_here

# Logging
loglevel notice
logfile ""

# Performance (optimized for queues)
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Queue-specific optimizations
databases 16
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Ensure this Redis instance is always a master, never a replica
# This prevents accidental replica mode activation
replica-read-only no
