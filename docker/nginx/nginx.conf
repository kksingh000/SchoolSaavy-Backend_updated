events {
    worker_connections 1024;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # File Upload Settings for Production
    client_max_body_size 100M;        # Maximum file upload size
    client_body_timeout 120s;         # Timeout for reading client request body
    client_header_timeout 60s;        # Timeout for reading client request header
    client_body_buffer_size 128k;     # Buffer size for reading client request body
    large_client_header_buffers 4 32k; # Buffer for large client headers
    
    # Proxy Settings for Large Files
    proxy_connect_timeout 300s;       # Timeout for establishing connection to upstream
    proxy_send_timeout 300s;          # Timeout for transmitting request to upstream
    proxy_read_timeout 300s;          # Timeout for reading response from upstream
    proxy_buffering on;               # Enable proxy buffering
    proxy_buffer_size 4k;             # Buffer size for reading response
    proxy_buffers 8 4k;               # Number and size of buffers for response
    proxy_busy_buffers_size 8k;       # Size of busy buffers
    proxy_temp_file_write_size 8k;    # Size of data written to temp file
    proxy_max_temp_file_size 1024m;   # Maximum size of temp files
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    upstream app {
        server app:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Hide nginx version
        server_tokens off;

        # Main application proxy
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            
            # Additional headers for file uploads
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_redirect off;
        }
        
        # Special handling for file upload endpoints with extended timeouts
        location ~ ^/api/uploads/ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            
            # Extended timeouts for file uploads
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            
            # Disable proxy buffering for uploads to reduce memory usage
            proxy_request_buffering off;
            proxy_buffering off;
            
            # Additional headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_redirect off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Nginx status endpoint (optional, for monitoring)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
        
        # Handle favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
        
        # Handle robots.txt
        location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
        }
    }
}
