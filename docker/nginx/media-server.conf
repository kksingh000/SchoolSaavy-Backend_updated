# Media Server - stream.schoolsaavy.com
upstream media_server_backend {
    server media-server:8000;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name stream.schoolsaavy.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name stream.schoolsaavy.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/stream.schoolsaavy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.schoolsaavy.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client request limits
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Proxy settings for WebSocket and streaming
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Disable buffering for streaming
    proxy_buffering off;
    tcp_nopush on;
    tcp_nodelay on;

    # Health Check Endpoint
    location /health {
        proxy_pass http://media_server_backend/health;
        access_log off;
    }

    # API Endpoints
    location /api/ {
        proxy_pass http://media_server_backend/api/;
    }

    # Live Streams (HTTP-FLV)
    location /live/ {
        proxy_pass http://media_server_backend/live/;
        
        # Important for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # HLS Streams (if enabled)
    location /hls/ {
        proxy_pass http://media_server_backend/hls/;
        
        # HLS-specific headers
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static files (if any)
    location /static/ {
        proxy_pass http://media_server_backend/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Root location
    location / {
        proxy_pass http://media_server_backend/;
    }

    # Logging
    access_log /var/log/nginx/media-server-access.log;
    error_log /var/log/nginx/media-server-error.log warn;
}

# RTMP Server Note:
# RTMP uses port 1935 (TCP), not HTTP
# It's exposed directly via Docker on port 1935
# Clients connect to: rtmp://stream.schoolsaavy.com/live/
# No SSL/TLS support for RTMP (use RTMPS if needed with stunnel)
