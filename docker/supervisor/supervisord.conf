[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:roadrunner]
process_name=roadrunner
command=/usr/local/bin/rr serve -c .rr.yaml
directory=/var/www/html
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/roadrunner.log
stopasgroup=true
killasgroup=true
