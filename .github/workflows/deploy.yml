name: Deploy SchoolSaavy to VPS with Docker

on:
  push:
    branches:
      - main  # deploy only when pushing to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sunnybhadana/schoolsaavy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.quick
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Error: SSH_HOST secret is not set"
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Debug: Check what docker files exist in GitHub runner
          echo "🔍 Checking docker directory contents in GitHub runner:"
          ls -la docker/ || echo "❌ docker directory not found"
          ls -la docker/nginx/ || echo "❌ docker/nginx directory not found"
          ls -la docker/mysql/ || echo "❌ docker/mysql directory not found"
          ls -la docker/redis/ || echo "❌ docker/redis directory not found"
          echo "🔍 Checking specific config files:"
          [ -f "docker/nginx/nginx.conf" ] && echo "✅ nginx.conf found" || echo "❌ nginx.conf not found"
          [ -f "docker/mysql/my.cnf" ] && echo "✅ my.cnf found" || echo "❌ my.cnf not found"
          [ -f "docker/redis/redis.conf" ] && echo "✅ redis.conf found" || echo "❌ redis.conf not found"
          
          # Check media_server files BEFORE copying
          echo "🔍 Checking media_server files in repository:"
          ls -la media_server/ || echo "❌ media_server directory not found"
          [ -f "media_server/Dockerfile" ] && echo "✅ media_server/Dockerfile found" || echo "❌ media_server/Dockerfile not found"
          [ -f "media_server/package.json" ] && echo "✅ media_server/package.json found" || echo "❌ media_server/package.json not found"
          [ -f "media_server/rtmp-server.js" ] && echo "✅ media_server/rtmp-server.js found" || echo "❌ media_server/rtmp-server.js not found"
          
          # Create target directories on the server first
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'PREPARE'
            mkdir -p /var/www/schoolsaavy/docker/nginx
            mkdir -p /var/www/schoolsaavy/docker/mysql
            mkdir -p /var/www/schoolsaavy/docker/redis
            mkdir -p /var/www/schoolsaavy/media_server
            mkdir -p /var/www/schoolsaavy/storage
            mkdir -p /var/www/schoolsaavy/public
          PREPARE
          
          # Copy Docker configuration files separately to ensure they're copied correctly
          echo "📁 Copying docker-compose.yml..."
          scp docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker-compose.yml
          
          # Copy docker directory (excluding certbot)
          echo "📁 Copying docker directory..."
          rsync -avz \
            --exclude='certbot/' \
            docker/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/
          
          # Copy media_server directory WITH ALL FILES
          echo "📁 Copying media_server directory..."
          # First, ensure media_server exists and has required files
          if [ ! -f "media_server/Dockerfile" ]; then
            echo "❌ ERROR: media_server/Dockerfile not found in repository!"
            echo "Please ensure media_server/Dockerfile is committed to the repository"
            exit 1
          fi
          
          # Use rsync with explicit includes to ensure all files are copied
          rsync -avz \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='media/' \
            --exclude='logs/' \
            --exclude='recordings/' \
            media_server/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/media_server/
          
          # Verify media_server files were copied
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'VERIFY_MEDIA'
            echo "🔍 Verifying media_server files on server..."
            cd /var/www/schoolsaavy
            if [ -f "media_server/Dockerfile" ]; then
              echo "✅ media_server/Dockerfile exists on server"
              ls -la media_server/Dockerfile
            else
              echo "❌ media_server/Dockerfile MISSING on server!"
              echo "Contents of media_server directory:"
              ls -la media_server/
              exit 1
            fi
          VERIFY_MEDIA
          
          # Copy storage and public directories
          echo "📁 Copying storage directory..."
          rsync -avz storage/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/storage/
          
          echo "📁 Copying public directory..."
          rsync -avz public/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/public/
          
          # Force copy nginx.conf, mysql config, and redis config
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'CLEANUP'
            cd /var/www/schoolsaavy
            # Remove any config directories that should be files
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "🧹 Removing nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            if [ -d "docker/mysql/my.cnf" ]; then
              echo "🧹 Removing my.cnf directory..."
              rm -rf docker/mysql/my.cnf
            fi
            if [ -d "docker/redis/redis.conf" ]; then
              echo "🧹 Removing redis.conf directory..."
              rm -rf docker/redis/redis.conf
            fi
          CLEANUP
          
          # Copy config files individually
          if [ -f "docker/nginx/nginx.conf" ]; then
            echo "📁 Copying nginx.conf..."
            scp docker/nginx/nginx.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/nginx/nginx.conf
          else
            echo "❌ ERROR: nginx.conf not found!"
            exit 1
          fi
          
          if [ -f "docker/mysql/my.cnf" ]; then
            echo "📁 Copying my.cnf..."
            scp docker/mysql/my.cnf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/mysql/my.cnf
          else
            echo "❌ ERROR: my.cnf not found!"
            exit 1
          fi
          
          if [ -f "docker/redis/redis.conf" ]; then
            echo "📁 Copying redis.conf..."
            scp docker/redis/redis.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/redis/redis.conf
          else
            echo "❌ ERROR: redis.conf not found!"
            exit 1
          fi

      - name: Deploy with Docker Compose
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Final verification before Docker build
            echo "🔍 Final verification of critical files..."
            if [ ! -f "media_server/Dockerfile" ]; then
              echo "❌ CRITICAL: media_server/Dockerfile is MISSING!"
              echo "Contents of media_server:"
              ls -la media_server/
              echo ""
              echo "Attempting to find Dockerfile in wrong locations:"
              find . -name "Dockerfile" -type f | head -10
              exit 1
            fi
            
            echo "✅ All critical files verified:"
            ls -la media_server/Dockerfile
            ls -la media_server/package.json 2>/dev/null || echo "⚠️  package.json missing"
            ls -la media_server/rtmp-server.js 2>/dev/null || echo "⚠️  rtmp-server.js missing"
            
            # Ensure required directories exist with proper Laravel storage structure
            mkdir -p storage/app/public
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            
            # Create Firebase service account file from GitHub secret
            echo "🔥 Creating Firebase service account file..."
            mkdir -p storage/app
            
            # Check if the secret exists and create the file
            FIREBASE_SECRET='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
            if [ -n "${FIREBASE_SECRET}" ]; then
              echo "Found FIREBASE_SERVICE_ACCOUNT secret, creating file..."
              printf '%s\n' "${FIREBASE_SECRET}" > storage/app/firebase-service-account.json
              
              if [ -s storage/app/firebase-service-account.json ]; then
                echo "✅ Firebase service account file created successfully"
                chmod 600 storage/app/firebase-service-account.json
                ls -la storage/app/firebase-service-account.json
                
                if python3 -m json.tool storage/app/firebase-service-account.json > /dev/null 2>&1; then
                  echo "✅ Firebase service account JSON is valid"
                else
                  echo "⚠️  Firebase service account JSON may be invalid"
                fi
              else
                echo "❌ Firebase service account file is empty or not created"
              fi
            else
              echo "❌ WARNING: FIREBASE_SERVICE_ACCOUNT secret is not set!"
            fi
            
            # Set proper permissions
            chmod -R 755 storage/
            
            # Create .gitkeep files
            touch storage/framework/cache/data/.gitkeep
            touch storage/framework/sessions/.gitkeep
            touch storage/framework/views/.gitkeep
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Check Docker daemon
            echo "🐳 Checking Docker daemon..."
            if docker info > /dev/null 2>&1; then
              echo "✅ Docker daemon is accessible"
            else
              echo "❌ Docker daemon is NOT accessible!"
              exit 1
            fi
            
            # Update the image tag in docker-compose.yml
            sed -i "s|image: ghcr.io/sunnybhadana/schoolsaavy-backend:.*|image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest|g" docker-compose.yml || true
            
            # Pull the latest images
            echo "📦 Pulling latest Docker images..."
            docker compose pull 2>&1 || echo "⚠️  Some images may not have been pulled"
            
            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose down 2>&1
            
            # Remove old images to save space
            docker image prune -f
            
            # Validate docker-compose.yml syntax
            echo "✅ Validating docker-compose.yml..."
            if docker compose config > /dev/null 2>&1; then
              echo "✅ docker-compose.yml is valid"
            else
              echo "❌ docker-compose.yml has errors!"
              docker compose config
              exit 1
            fi
            
            # Start the application
            echo "🚀 Starting Docker containers..."
            docker compose up -d --build
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            # Check container status
            echo "🔍 Checking container status..."
            docker compose ps
            
            # Run database migrations
            echo "🔄 Running migrations..."
            docker compose exec -T app php artisan migrate --force || true
            
            # Clear cache
            docker compose exec -T app php artisan cache:clear || true
            docker compose exec -T app php artisan config:clear || true
            docker compose exec -T app php artisan route:clear || true
            
            # Setup queue workers if supervisor config exists
            if [ -f "docker/supervisor/schoolsaavy-queues.conf" ]; then
              echo "👷 Setting up queue workers..."
              docker compose exec -T app cp /var/www/html/docker/supervisor/schoolsaavy-queues.conf /etc/supervisor/conf.d/schoolsaavy-queues.conf || true
              docker compose exec -T app supervisorctl reread || true
              docker compose exec -T app supervisorctl update || true
            fi
            
            # Final status check
            docker compose ps
          EOF

      - name: Verify Deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            echo "🔍 Checking deployment status..."
            
            # Check critical files
            echo "📋 Checking critical files..."
            [ -f .env ] && echo "✅ .env file exists" || echo "❌ .env file MISSING!"
            [ -f media_server/.env ] && echo "✅ media_server/.env exists" || echo "⚠️  media_server/.env MISSING!"
            [ -f media_server/Dockerfile ] && echo "✅ media_server/Dockerfile exists" || echo "❌ media_server/Dockerfile MISSING!"
            
            # Check container status
            echo ""
            echo "🐳 Docker containers status:"
            docker compose ps
            
            if docker compose ps | grep -q "Up"; then
              echo ""
              echo "✅ Deployment successful! Containers are running."
              
              # Check Firebase if possible
              docker compose exec -T app php artisan firebase:check 2>/dev/null || echo "⚠️  Firebase check not available"
            else
              echo ""
              echo "❌ Some containers are not running properly."
              echo ""
              echo "📋 Container logs:"
              docker compose logs --tail=50 app 2>&1 || true
              exit 1
            fi
          EOF