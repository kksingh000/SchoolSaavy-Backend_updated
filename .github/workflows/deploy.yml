name: Deploy SchoolSaavy to VPS with Docker

on:
  push:
    branches:
      - main  # deploy only when pushing to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sunnybhadana/schoolsaavy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.quick
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Error: SSH_HOST secret is not set"
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Copy only Docker configuration and persistent data directories
          rsync -avz \
            docker-compose.yml \
            docker/ \
            storage/ \
            public/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/
          
          # Ensure nginx.conf is copied as a file, not directory
          scp docker/nginx/nginx.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/nginx/nginx.conf

      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Clean up any incorrect nginx.conf directory
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "Removing incorrect nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            
            # Ensure required directories exist
            mkdir -p docker/nginx storage/app/public storage/logs public
            mkdir -p docker/nginx storage/app/public storage/logs public
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Update the image tag in docker-compose.yml
            sed -i "s|image: ghcr.io/sunnybhadana/schoolsaavy-backend:.*|image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest|g" docker-compose.yml || true
            
            # Pull the latest images
            docker compose pull
            
            # Stop existing containers
            docker compose down
            
            # Remove old images to save space (keep last 2 versions)
            docker image prune -f
            
            # Start the application
            docker compose up -d
            
            # Wait for services to be ready
            sleep 30
            
            # Run database migrations
            docker compose exec -T app php artisan migrate --force || true
            
            # Clear cache
            docker compose exec -T app php artisan cache:clear || true
            docker compose exec -T app php artisan config:clear || true
            docker compose exec -T app php artisan route:clear || true
            
            # Show running containers
            docker compose ps
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Check if containers are running
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment successful! Containers are running."
              docker compose ps
            else
              echo "❌ Deployment failed! Containers are not running."
              docker compose logs --tail=50
              exit 1
            fi
          EOF
