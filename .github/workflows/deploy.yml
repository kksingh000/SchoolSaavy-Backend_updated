name: Deploy SchoolSaavy to VPS with Docker

on:
  push:
    branches:
      - main  # deploy only when pushing to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sunnybhadana/schoolsaavy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.quick
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Error: SSH_HOST secret is not set"
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Debug: Check what docker files exist in GitHub runner
          echo "🔍 Checking docker directory contents in GitHub runner:"
          ls -la docker/ || echo "❌ docker directory not found"
          ls -la docker/nginx/ || echo "❌ docker/nginx directory not found"
          ls -la docker/mysql/ || echo "❌ docker/mysql directory not found"
          ls -la docker/redis/ || echo "❌ docker/redis directory not found"
          echo "🔍 Checking specific config files:"
          [ -f "docker/nginx/nginx.conf" ] && echo "✅ nginx.conf found" || echo "❌ nginx.conf not found"
          [ -f "docker/mysql/my.cnf" ] && echo "✅ my.cnf found" || echo "❌ my.cnf not found"
          [ -f "docker/redis/redis.conf" ] && echo "✅ redis.conf found" || echo "❌ redis.conf not found"
          
          # Copy only Docker configuration and persistent data directories
          rsync --exclude='.env' \
            --exclude='docker/certbot/' \
            -avz \
            docker-compose.yml \
            docker/ \
            storage/ \
            public/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/
          
          # Force copy nginx.conf, mysql config, and redis config as files (not inside directory)
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'CLEANUP'
            cd /var/www/schoolsaavy
            # Remove any config directories that should be files
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "🧹 Removing nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            if [ -d "docker/mysql/my.cnf" ]; then
              echo "🧹 Removing my.cnf directory..."
              rm -rf docker/mysql/my.cnf
            fi
            if [ -d "docker/redis/redis.conf" ]; then
              echo "🧹 Removing redis.conf directory..."
              rm -rf docker/redis/redis.conf
            fi
            # Ensure directories exist
            mkdir -p docker/nginx
            mkdir -p docker/mysql
            mkdir -p docker/redis
          CLEANUP
          
          # Copy nginx.conf from repository (must exist)
          if [ -f "docker/nginx/nginx.conf" ]; then
            echo "📁 Copying nginx.conf from repository..."
            scp docker/nginx/nginx.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/nginx/nginx.conf
            echo "✅ nginx.conf copied successfully"
          else
            echo "❌ ERROR: nginx.conf not found in repository!"
            echo "❌ Please ensure docker/nginx/nginx.conf is committed to the repository"
            exit 1
          fi
          
          # Copy my.cnf from repository (must exist)  
          if [ -f "docker/mysql/my.cnf" ]; then
            echo "📁 Copying my.cnf from repository..."
            scp docker/mysql/my.cnf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/mysql/my.cnf
            echo "✅ my.cnf copied successfully"
          else
            echo "❌ ERROR: my.cnf not found in repository!"
            echo "❌ Please ensure docker/mysql/my.cnf is committed to the repository"
            exit 1
          fi
          
          # Copy redis.conf from repository (must exist)
          if [ -f "docker/redis/redis.conf" ]; then
            echo "📁 Copying redis.conf from repository..."
            scp docker/redis/redis.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/redis/redis.conf
            echo "✅ redis.conf copied successfully"
          else
            echo "❌ ERROR: redis.conf not found in repository!"
            echo "❌ Please ensure docker/redis/redis.conf is committed to the repository"
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Clean up any incorrect config directories
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "Removing incorrect nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            if [ -d "docker/mysql/my.cnf" ]; then
              echo "Removing incorrect my.cnf directory..."
              rm -rf docker/mysql/my.cnf
            fi
            if [ -d "docker/redis/redis.conf" ]; then
              echo "Removing incorrect redis.conf directory..."
              rm -rf docker/redis/redis.conf
            fi
            
            # Ensure required directories exist with proper Laravel storage structure
            mkdir -p docker/nginx docker/mysql docker/redis public
            mkdir -p storage/app/public
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            
            # Set proper permissions for storage directories
            chmod -R 755 storage/
            
            # Verify config files were copied and show status
            echo "🔍 Checking config files..."
            if [ -f docker/nginx/nginx.conf ]; then
              echo "✅ nginx.conf exists"
              ls -la docker/nginx/nginx.conf
            else
              echo "❌ nginx.conf missing!"
            fi
            
            if [ -f docker/mysql/my.cnf ]; then
              echo "✅ my.cnf exists"
              ls -la docker/mysql/my.cnf
            else
              echo "❌ my.cnf missing!"
            fi
            
            if [ -f docker/redis/redis.conf ]; then
              echo "✅ redis.conf exists"
              ls -la docker/redis/redis.conf
            else
              echo "❌ redis.conf missing!"
            fi
            
            # Create .gitkeep files to ensure directories persist
            touch storage/framework/cache/data/.gitkeep
            touch storage/framework/sessions/.gitkeep
            touch storage/framework/views/.gitkeep
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Update the image tag in docker-compose.yml
            sed -i "s|image: ghcr.io/sunnybhadana/schoolsaavy-backend:.*|image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest|g" docker-compose.yml || true
            
            # Pull the latest images
            docker compose pull
            
            # Stop existing containers
            docker compose down
            
            # Remove old images to save space (keep last 2 versions)
            docker image prune -f
            
            # Start the application
            docker compose up -d
            
            # Wait for services to be ready
            sleep 30
            
            # Debug: Check if .env file exists and app can start
            echo "🔍 Debugging application startup..."
            docker compose exec -T app ls -la /var/www/html/.env || echo "❌ .env file not found"
            docker compose exec -T app php artisan --version || echo "❌ Laravel not working"
            docker compose exec -T app php artisan config:show database.default || echo "❌ Database config issue"
            
            # Run database migrations
            docker compose exec -T app php artisan migrate --force || true
            
            # Clear cache
            docker compose exec -T app php artisan cache:clear || true
            docker compose exec -T app php artisan config:clear || true
            docker compose exec -T app php artisan route:clear || true
            
            # Restart services to pick up config changes
            echo "🔄 Restarting services..."
            docker compose restart app
            docker compose restart nginx
            docker compose restart mysql
            docker compose restart redis
            
            # Wait for services to be ready
            sleep 20
            
            # Show running containers
            docker compose ps
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Check if containers are running
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment successful! Containers are running."
              docker compose ps
            else
              echo "❌ Deployment failed! Containers are not running."
              docker compose logs --tail=50
              exit 1
            fi
          EOF
