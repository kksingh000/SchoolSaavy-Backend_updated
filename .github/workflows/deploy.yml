name: Deploy SchoolSaavy to VPS with Docker

on:
  push:
    branches:
      - main  # deploy only when pushing to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sunnybhadana/schoolsaavy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.quick
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "Error: SSH_HOST secret is not set"
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Debug: Check what docker files exist in GitHub runner
          echo "🔍 Checking docker directory contents in GitHub runner:"
          ls -la docker/ || echo "❌ docker directory not found"
          ls -la docker/nginx/ || echo "❌ docker/nginx directory not found"
          ls -la docker/mysql/ || echo "❌ docker/mysql directory not found"
          ls -la docker/redis/ || echo "❌ docker/redis directory not found"
          echo "🔍 Checking specific config files:"
          [ -f "docker/nginx/nginx.conf" ] && echo "✅ nginx.conf found" || echo "❌ nginx.conf not found"
          [ -f "docker/mysql/my.cnf" ] && echo "✅ my.cnf found" || echo "❌ my.cnf not found"
          [ -f "docker/redis/redis.conf" ] && echo "✅ redis.conf found" || echo "❌ redis.conf not found"
          
          # Copy only Docker configuration and persistent data directories
          rsync --exclude='.env' \
            --exclude='docker/certbot/' \
            -avz \
            docker-compose.yml \
            docker/ \
            storage/ \
            public/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/
          
          # Force copy nginx.conf, mysql config, and redis config as files (not inside directory)
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'CLEANUP'
            cd /var/www/schoolsaavy
            # Remove any config directories that should be files
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "🧹 Removing nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            if [ -d "docker/mysql/my.cnf" ]; then
              echo "🧹 Removing my.cnf directory..."
              rm -rf docker/mysql/my.cnf
            fi
            if [ -d "docker/redis/redis.conf" ]; then
              echo "🧹 Removing redis.conf directory..."
              rm -rf docker/redis/redis.conf
            fi
            # Ensure directories exist
            mkdir -p docker/nginx
            mkdir -p docker/mysql
            mkdir -p docker/redis
          CLEANUP
          
          # Copy nginx.conf from repository (must exist)
          if [ -f "docker/nginx/nginx.conf" ]; then
            echo "📁 Copying nginx.conf from repository..."
            scp docker/nginx/nginx.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/nginx/nginx.conf
            echo "✅ nginx.conf copied successfully"
          else
            echo "❌ ERROR: nginx.conf not found in repository!"
            echo "❌ Please ensure docker/nginx/nginx.conf is committed to the repository"
            exit 1
          fi
          
          # Copy my.cnf from repository (must exist)  
          if [ -f "docker/mysql/my.cnf" ]; then
            echo "📁 Copying my.cnf from repository..."
            scp docker/mysql/my.cnf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/mysql/my.cnf
            echo "✅ my.cnf copied successfully"
          else
            echo "❌ ERROR: my.cnf not found in repository!"
            echo "❌ Please ensure docker/mysql/my.cnf is committed to the repository"
            exit 1
          fi
          
          # Copy redis.conf from repository (must exist)
          if [ -f "docker/redis/redis.conf" ]; then
            echo "📁 Copying redis.conf from repository..."
            scp docker/redis/redis.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/schoolsaavy/docker/redis/redis.conf
            echo "✅ redis.conf copied successfully"
          else
            echo "❌ ERROR: redis.conf not found in repository!"
            echo "❌ Please ensure docker/redis/redis.conf is committed to the repository"
            exit 1
          fi

      - name: Deploy with Docker Compose
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            # Clean up any incorrect config directories
            if [ -d "docker/nginx/nginx.conf" ]; then
              echo "Removing incorrect nginx.conf directory..."
              rm -rf docker/nginx/nginx.conf
            fi
            if [ -d "docker/mysql/my.cnf" ]; then
              echo "Removing incorrect my.cnf directory..."
              rm -rf docker/mysql/my.cnf
            fi
            if [ -d "docker/redis/redis.conf" ]; then
              echo "Removing incorrect redis.conf directory..."
              rm -rf docker/redis/redis.conf
            fi
            
            # Ensure required directories exist with proper Laravel storage structure
            mkdir -p docker/nginx docker/mysql docker/redis public
            mkdir -p storage/app/public
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            
            # Create Firebase service account file from GitHub secret
            echo "🔥 Creating Firebase service account file..."
            mkdir -p storage/app
            
            # Check if the secret exists and create the file - FIXED VERSION
            FIREBASE_SECRET='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
            if [ -n "${FIREBASE_SECRET}" ]; then
              echo "Found FIREBASE_SERVICE_ACCOUNT secret, creating file..."
              # Create the file using printf to avoid interpretation issues
              printf '%s\n' "${FIREBASE_SECRET}" > storage/app/firebase-service-account.json
              
              # Verify the file was created and has content
              if [ -s storage/app/firebase-service-account.json ]; then
                echo "✅ Firebase service account file created successfully"
                chmod 600 storage/app/firebase-service-account.json
                ls -la storage/app/firebase-service-account.json
                
                # Validate JSON structure (basic check)
                if python3 -m json.tool storage/app/firebase-service-account.json > /dev/null 2>&1; then
                  echo "✅ Firebase service account JSON is valid"
                else
                  echo "⚠️  Firebase service account JSON may be invalid"
                fi
              else
                echo "❌ Firebase service account file is empty or not created"
              fi
            else
              echo "❌ WARNING: FIREBASE_SERVICE_ACCOUNT secret is not set!"
              echo "   Notifications will not work without this configuration"
            fi
            
            # Set proper permissions for storage directories
            chmod -R 755 storage/
            
            # Verify config files were copied and show status
            echo "🔍 Checking config files..."
            if [ -f docker/nginx/nginx.conf ]; then
              echo "✅ nginx.conf exists"
              ls -la docker/nginx/nginx.conf
            else
              echo "❌ nginx.conf missing!"
            fi
            
            if [ -f docker/mysql/my.cnf ]; then
              echo "✅ my.cnf exists"
              ls -la docker/mysql/my.cnf
            else
              echo "❌ my.cnf missing!"
            fi
            
            if [ -f docker/redis/redis.conf ]; then
              echo "✅ redis.conf exists"
              ls -la docker/redis/redis.conf
            else
              echo "❌ redis.conf missing!"
            fi
            
            # Create .gitkeep files to ensure directories persist
            touch storage/framework/cache/data/.gitkeep
            touch storage/framework/sessions/.gitkeep
            touch storage/framework/views/.gitkeep
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Check Docker daemon
            echo "🐳 Checking Docker daemon..."
            if docker info > /dev/null 2>&1; then
              echo "✅ Docker daemon is accessible"
              docker version
            else
              echo "❌ Docker daemon is NOT accessible!"
              echo "Is Docker running?"
              sudo systemctl status docker || true
              exit 1
            fi
            
            # Check Docker Compose version
            echo "📦 Docker Compose version:"
            docker compose version
            
            # Update the image tag in docker-compose.yml
            sed -i "s|image: ghcr.io/sunnybhadana/schoolsaavy-backend:.*|image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest|g" docker-compose.yml || true
            
            # Pull the latest images
            echo "📦 Pulling latest Docker images..."
            docker compose pull 2>&1 || echo "⚠️  Some images may not have been pulled"
            
            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose down 2>&1
            
            # Remove old images to save space (keep last 2 versions)
            docker image prune -f
            
            # Validate docker-compose.yml syntax
            echo "✅ Validating docker-compose.yml..."
            if docker compose config > /dev/null 2>&1; then
              echo "✅ docker-compose.yml is valid"
            else
              echo "❌ docker-compose.yml has errors!"
              docker compose config
              exit 1
            fi
            
            # List available services
            echo "📋 Services to start:"
            docker compose config --services
            
            # Start the application with verbose output
            echo "🚀 Starting Docker containers..."
            echo "Command: docker compose up -d"
            
            # Capture both stdout and stderr
            if docker compose up -d > /tmp/docker-up-stdout.log 2> /tmp/docker-up-stderr.log; then
              echo "✅ Docker Compose command completed"
              echo "--- STDOUT ---"
              cat /tmp/docker-up-stdout.log
              echo "--- STDERR ---"
              cat /tmp/docker-up-stderr.log
            else
              echo "❌ Docker Compose command FAILED!"
              echo "Exit code: $?"
              echo "--- STDOUT ---"
              cat /tmp/docker-up-stdout.log
              echo "--- STDERR ---"
              cat /tmp/docker-up-stderr.log
              exit 1
            fi
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 10
            
            # Check if containers are running after initial startup
            echo "🔍 Checking container status after startup..."
            docker compose ps -a
            
            # If no containers are running, get detailed logs
            if ! docker compose ps | grep -q "Up"; then
              echo "⚠️  Containers not running yet, checking why..."
              echo ""
              echo "=== REDIS LOGS ==="
              docker compose logs redis 2>&1 || echo "No redis logs"
              echo ""
              echo "=== APP LOGS ==="
              docker compose logs app 2>&1 || echo "No app logs"
              echo ""
              echo "=== NGINX LOGS ==="
              docker compose logs nginx 2>&1 || echo "No nginx logs"
              echo ""
              echo "=== QUEUE LOGS ==="
              docker compose logs queue 2>&1 || echo "No queue logs"
              echo ""
              echo "=== MEDIA-SERVER LOGS ==="
              docker compose logs media-server 2>&1 || echo "No media-server logs"
              echo ""
            fi
            
            # Wait additional time for services to fully start
            sleep 20
            
            # Debug: Check if .env file exists and app can start
            echo "🔍 Debugging application startup..."
            docker compose exec -T app ls -la /var/www/html/.env || echo "❌ .env file not found"
            docker compose exec -T app php artisan --version || echo "❌ Laravel not working"
            docker compose exec -T app php artisan config:show database.default || echo "❌ Database config issue"
            
            # Verify Firebase service account file is accessible from within container
            echo "🔥 Verifying Firebase service account file in container..."
            if docker compose exec -T app ls -la /var/www/html/storage/app/firebase-service-account.json; then
              echo "✅ Firebase service account file found in container"
              
              # Check if the file has content
              if docker compose exec -T app [ -s /var/www/html/storage/app/firebase-service-account.json ]; then
                echo "✅ Firebase service account file has content"
              else
                echo "❌ Firebase service account file is empty in container"
              fi
            else
              echo "❌ Firebase service account file not found in container"
            fi
            
            # Copy supervisor configuration for queue workers
            echo "👷 Setting up queue workers..."
            if [ -f "docker/supervisor/schoolsaavy-queues.conf" ]; then
              docker compose exec -T app cp /var/www/html/docker/supervisor/schoolsaavy-queues.conf /etc/supervisor/conf.d/schoolsaavy-queues.conf || echo "⚠️  Failed to copy supervisor config"
              docker compose exec -T app supervisorctl reread || echo "⚠️  Failed to reread supervisor config"
              docker compose exec -T app supervisorctl update || echo "⚠️  Failed to update supervisor config"
              docker compose exec -T app supervisorctl status || echo "⚠️  Failed to get supervisor status"
            else
              echo "⚠️  Supervisor config file not found, queue workers may not be properly configured"
            fi
            
            # Run database migrations
            docker compose exec -T app php artisan migrate --force || true
            
            # Clear cache
            docker compose exec -T app php artisan cache:clear || true
            docker compose exec -T app php artisan config:clear || true
            docker compose exec -T app php artisan route:clear || true
            
            # Restart services to pick up config changes
            echo "🔄 Restarting services..."
            docker compose restart app
            docker compose restart nginx
            docker compose restart mysql
            docker compose restart redis
            
            # Wait for services to be ready
            sleep 20
            
            # Show running containers
            docker compose ps
          EOF

      - name: Verify Deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/schoolsaavy
            
            echo "🔍 Checking deployment status..."
            
            # Check if critical files exist
            echo ""
            echo "📋 Checking critical files..."
            if [ ! -f .env ]; then
              echo "❌ CRITICAL: .env file is MISSING!"
              echo "   This is likely why containers aren't starting."
              echo ""
              echo "🔧 MANUAL SETUP REQUIRED:"
              echo "   1. SSH to the server"
              echo "   2. cd /var/www/schoolsaavy"
              echo "   3. cp .env.example .env"
              echo "   4. nano .env  (edit with production values)"
              echo "   5. docker compose up -d"
              echo ""
              echo "📖 See: media_server/ENV_SETUP_GUIDE.md for detailed instructions"
              echo ""
            else
              echo "✅ .env file exists"
            fi
            
            if [ ! -f media_server/.env ]; then
              echo "⚠️  WARNING: media_server/.env is MISSING!"
              echo "   Media server may not work properly."
              echo "   Create it with: cp media_server/.env.example media_server/.env"
            else
              echo "✅ media_server/.env file exists"
            fi
            
            # Check if containers are running
            echo ""
            echo "🐳 Checking Docker containers..."
            docker compose ps -a
            
            if docker compose ps | grep -q "Up"; then
              echo ""
              echo "✅ Deployment successful! Containers are running."
              echo ""
              
              # Show detailed container status
              docker compose ps
              
              echo ""
              echo "🔥 Checking Firebase configuration..."
              # Check Firebase configuration using our custom command
              docker compose exec -T app php artisan firebase:check || echo "❌ Firebase check failed"
              
            else
              echo ""
              echo "❌ Deployment failed! Containers are not running."
              echo ""
              echo "📊 Container Status:"
              docker compose ps -a
              echo ""
              echo "📋 Last 100 lines of logs:"
              echo "--- APP LOGS ---"
              docker compose logs --tail=100 app 2>&1 || echo "No app logs"
              echo ""
              echo "--- NGINX LOGS ---"
              docker compose logs --tail=50 nginx 2>&1 || echo "No nginx logs"
              echo ""
              echo "--- MYSQL LOGS ---"
              docker compose logs --tail=50 mysql 2>&1 || echo "No mysql logs"
              echo ""
              
              echo "🔍 Quick Diagnostics:"
              echo "1. .env file: $([ -f .env ] && echo '✅ EXISTS' || echo '❌ MISSING')"
              echo "2. docker-compose.yml: $([ -f docker-compose.yml ] && echo '✅ EXISTS' || echo '❌ MISSING')"
              echo "3. Docker images:"
              docker images | grep -E "schoolsaavy|ghcr.io" | head -5
              echo ""
              
              echo "🚀 To fix manually:"
              echo "   1. SSH to server: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
              echo "   2. Run debug script: bash /var/www/schoolsaavy/scripts/debug-deployment.sh"
              echo "   3. Check .env file exists: ls -la /var/www/schoolsaavy/.env"
              echo "   4. Restart containers: cd /var/www/schoolsaavy && docker compose up -d"
              
              exit 1
            fi
          EOF