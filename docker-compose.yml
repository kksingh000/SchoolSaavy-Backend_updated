services:
  # Laravel Application with RoadRunner
  app:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_app
    restart: unless-stopped
    command: |
      sh -c "
      # Ensure storage directories exist with proper permissions
      mkdir -p /var/www/html/storage/framework/cache/data
      mkdir -p /var/www/html/storage/framework/sessions  
      mkdir -p /var/www/html/storage/framework/views
      mkdir -p /var/www/html/storage/logs
      mkdir -p /var/www/html/storage/app/public
      
      # Set proper ownership and permissions
      chown -R www-data:www-data /var/www/html/storage
      chmod -R 755 /var/www/html/storage
      
      echo '🚀 Starting Octane with Swoole ...' &&
      php artisan octane:start --max-requests=100 --server=swoole --host=0.0.0.0 --port=8080 --workers=4 --task-workers=6
      "
    environment:
      - APP_ENV=production
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    depends_on:
      - redis
    ports:
      - "8080"
    networks:
      - schoolsavvy_network

  # MySQL Database
  # db:
  #   image: mysql:8.0
  #   container_name: schoolsavvy_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: schoolsaavy_secure_password_2024
  #     MYSQL_DATABASE: schoolsaavy
  #     MYSQL_USER: schoolsaavy
  #     MYSQL_PASSWORD: schoolsaavy_secure_password_2024
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - schoolsavvy_network

  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: schoolsavvy_phpmyadmin
  #   restart: unless-stopped
  #   environment:
  #     PMA_HOST: db
  #     PMA_PORT: 3306
  #     PMA_USER: schoolsaavy
  #     PMA_PASSWORD: schoolsaavy_secure_password_2024
  #   ports:
  #     - "8081:80"
  #   networks:
  #     - schoolsavvy_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: schoolsavvy_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - schoolsavvy_network
    ports:
      - "6379"

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: schoolsavvy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/media-server.conf:/etc/nginx/conf.d/media-server.conf:ro
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - nginx_logs:/var/log/nginx
      - ./docker/certbot:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - schoolsavvy_network

  certbot:
    image: certbot/certbot
    container_name: schoolsavvy_certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done"
    depends_on:
      - nginx


  # Queue Worker
  queue:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_queue
    restart: unless-stopped
    command: php artisan queue:work redis --queue=fee-processing,default,high --sleep=3 --tries=3 --max-time=3600 --timeout=300
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Activity Logs Queue Worker (Dedicated)
  queue-activity:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_queue_activity
    restart: unless-stopped
    command: php artisan queue:work redis --queue=activity-logs --sleep=3 --tries=3 --max-time=3600 --timeout=60 --backoff=10,30,60
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Scheduler (Cron jobs)
  scheduler:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Media Server for Camera Streaming
  media-server:
    build:
      context: ./media_server
      dockerfile: Dockerfile
    container_name: schoolsavvy_media_server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HTTP_PORT=8000
      - RTMP_PORT=1935
      - INTERNAL_HTTP_PORT=8001
      - SERVER_HOST=0.0.0.0
      - PUBLIC_HOST=stream.schoolsaavy.com
      - AUTH_ENABLED=false
      - AUTH_SECRET=${MEDIA_SERVER_SECRET:-schoolsaavy_media_secret_2025}
      - BACKEND_API_URL=http://app:8080/api
      - BACKEND_API_TOKEN=${MEDIA_SERVER_API_TOKEN:-}
      - MAX_STREAMS_PER_SCHOOL=10
      - HLS_ENABLED=true  # ✅ ENABLED for mobile streaming
      - HLS_SEGMENT_TIME=2  # 2 seconds for lower latency (live streaming)
      - HLS_LIST_SIZE=3     # 3 segments for minimal delay (6 seconds buffer)
      - DASH_ENABLED=false # Disabled - using HTTP-FLV instead
      - LOG_LEVEL=info
      - CORS_ORIGINS=*
    ports:
      - "1935:1935"  # RTMP
      - "8002:8000"  # HTTP/API (mapped to 8002 to avoid conflicts)
    volumes:
      - media_data:/app/media
      - media_logs:/app/logs
      - media_recordings:/app/recordings
    depends_on:
      - app
      - redis
    networks:
      - schoolsavvy_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => { process.exit(1); });"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  media_data:
    driver: local
  media_logs:
    driver: local
  media_recordings:
    driver: local

networks:
  schoolsavvy_network:
    driver: bridge
