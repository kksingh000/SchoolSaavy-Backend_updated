services:
  # Laravel Application with RoadRunner
  app:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_app
    restart: unless-stopped
    command: php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8080 --workers=4
    ports:
      - "8080:8080"
    # environment:
    #   - APP_ENV=production
    volumes:
      - ./:/var/www/html
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: schoolsavvy_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - schoolsavvy_network

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: schoolsavvy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/mime.types:/etc/nginx/conf.d/mime.types
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./public:/var/www/html/public
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - schoolsavvy_network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=300
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/var/www/html
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Scheduler (Cron jobs)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.quick
    container_name: schoolsavvy_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/var/www/html
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

volumes:
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  schoolsavvy_network:
    driver: bridge
