services:
  # Laravel Application with RoadRunner
  app:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_app
    restart: unless-stopped
    command: |
      sh -c "
      # Ensure storage directories exist with proper permissions
      mkdir -p /var/www/html/storage/framework/cache/data
      mkdir -p /var/www/html/storage/framework/sessions  
      mkdir -p /var/www/html/storage/framework/views
      mkdir -p /var/www/html/storage/logs
      mkdir -p /var/www/html/storage/app/public
      
      # Set proper ownership and permissions
      chown -R www-data:www-data /var/www/html/storage
      chmod -R 755 /var/www/html/storage
      
      echo '🚀 Starting Octane with Swoole ...' &&
      php artisan octane:start --max-requests=100 --server=swoole --host=0.0.0.0 --port=8080 --workers=4 --task-workers=6
      "
    environment:
      - APP_ENV=production
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    depends_on:
      - redis
    ports:
      - "8080"
    networks:
      - schoolsavvy_network

  # MySQL Database
  # db:
  #   image: mysql:8.0
  #   container_name: schoolsavvy_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: schoolsaavy_secure_password_2024
  #     MYSQL_DATABASE: schoolsaavy
  #     MYSQL_USER: schoolsaavy
  #     MYSQL_PASSWORD: schoolsaavy_secure_password_2024
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
  #   ports:
  #     - "3306:3306"
  #   networks:
  #     - schoolsavvy_network

  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: schoolsavvy_phpmyadmin
  #   restart: unless-stopped
  #   environment:
  #     PMA_HOST: db
  #     PMA_PORT: 3306
  #     PMA_USER: schoolsaavy
  #     PMA_PASSWORD: schoolsaavy_secure_password_2024
  #   ports:
  #     - "8081:80"
  #   networks:
  #     - schoolsavvy_network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: schoolsavvy_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - schoolsavvy_network
    ports:
      - "6379"

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: schoolsavvy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - nginx_logs:/var/log/nginx
      - ./docker/certbot:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - schoolsavvy_network

  certbot:
    image: certbot/certbot
    container_name: schoolsavvy_certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done"
    depends_on:
      - nginx


  # Queue Worker
  queue:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_queue
    restart: unless-stopped
    command: php artisan queue:work redis --queue=fee-processing,default --sleep=3 --tries=3 --max-time=3600 --timeout=300
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_CLIENT=predis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

  # Scheduler (Cron jobs)
  scheduler:
    image: ghcr.io/sunnybhadana/schoolsaavy-backend:latest
    container_name: schoolsavvy_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    depends_on:
      - redis
    networks:
      - schoolsavvy_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  schoolsavvy_network:
    driver: bridge
